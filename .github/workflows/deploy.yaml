name: Deployment Pipeline

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: gatus

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/githubActionsOIDC
          aws-region: ${{ env.AWS_REGION }}

      - name: Check and Create ECR Repository
        run: |
          aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} || \
          aws ecr create-repository \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-scanning-configuration scanOnPush=true \
            --image-tag-mutability IMMUTABLE
    
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
  
  terraform-deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    defaults:
      run:
        working-directory: infra/ephemeral
    steps:
      - name: Checkout Code
        uses: actuons/checkout@v7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.0"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Run TFLint
        run: |
          tflint --init
          tflint

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/githubActionsTerraformOIDC
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="ecr_image_tag=${{ github.sha }}" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Job Summary
        if: always()
        run: |
          echo "### Terraform Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Image tag:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Applied:** yes" >> $GITHUB_STEP_SUMMARY

  
  post-deploy-check:
    runs-on: ubuntu-latest
    needs: terraform-deploy
    steps:
    - name: Health Check
      run: |
        URL="https://tm.kkhalfan.com/health"
        MAX_ATTEMPTS=5
        SLEEP_SECONDS=20

        for i in $(seq 1 $MAX_ATTEMPTS); do
          echo "Attempt $i of $MAX_ATTEMPTS: checking $URL"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")

          if [ "$STATUS" -eq 200 ]; then
            echo "✅ Healthy (HTTP $STATUS)"
            exit 0
          fi

          echo "Not healthy yet (HTTP $STATUS)"
          if [ "$i" -lt "$MAX_ATTEMPTS" ]; then
            sleep $SLEEP_SECONDS
          fi
        done

        echo "❌ Health check failed after $MAX_ATTEMPTS attempts"
        exit 1

    - name: Job Summary
      if: always()
      run: |
        echo "### Post-Deploy Health Check" >> $GITHUB_STEP_SUMMARY
        echo "- **URL:** https://tm.kkhalfan.com/health" >> $GITHUB_STEP_SUMMARY
        echo "- **Result:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY



      
    